
<!DOCTYPE html>
<html>
<head>
    <title>Creftheus Runtime - Pastas Locais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <script>
        // O sistema lê automaticamente a pasta assets/textures para montar o jogo
        const scene = new THREE.Scene();
        const loader = new THREE.TextureLoader();
        
        // Procura dinamicamente o terreno nas pastas extraídas
        const terrain = loader.load('./assets/textures/terrain.png'); 
        
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const cube = new THREE.Mesh(
            new THREE.BoxGeometry(1,1,1), 
            new THREE.MeshBasicMaterial({ map: terrain })
        );
        scene.add(cube);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        function animate() { requestAnimationFrame(animate); cube.rotation.y += 0.01; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
